<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>La Palmeraie — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green-dark: #173C11;
      --green:      #39812F;
      --green-light:#e8f5e4;
      --bg:         #f4f5f7;
      --border:     #e2e4e9;
      --text:       #1a1d23;
      --muted:      #6b7280;
      --danger:     #ef4444;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo img {
      height: 48px;
      width: auto;
    }
    .login-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-top: 10px;
    }
    .login-logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--green); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--green-dark); }
    .btn-login:disabled { background: #9ca3af; cursor: not-allowed; }
    .error-msg {
      background: #fee2e2;
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <img src="logopalmeraiedarkmodelarge.png" alt="La Palmeraie" onerror="this.style.display='none'">
      <h1>La Palmeraie</h1>
      <p>Gestion des stocks</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Se connecter
    </button>
  </div>

  <script>
    const API = 'http://localhost:8000';

    // Allow pressing Enter to submit
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorMsg');

      if (!username || !password) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion...';
      err.classList.remove('visible');

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Erreur de connexion');
          return;
        }

        // Save token and user info in localStorage
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({
          id: data.user_id,
          name: data.name,
          role: data.role
        }));

        // Redirect to dashboard
        window.location.href = 'index.html';

      } catch (e) {
        showError('Impossible de contacter le serveur. Vérifiez que le backend est lancé.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Se connecter';
      }
    }

    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.classList.add('visible');
    }

    // Redirect to dashboard if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
